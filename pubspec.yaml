name: absentio
description: "Student attendance tracking app - Track your course absences across semesters."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Database
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Localization
  easy_localization: ^3.0.7+1

  # Local storage (settings)
  shared_preferences: ^2.3.4

  # Utilities
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.5.4
  drift_dev: ^2.28.0
  freezed: ^2.5.8
  json_serializable: ^6.9.5

  # Launcher icon generation
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logos/applogo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logos/applogo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/l10n/
    - assets/logos/
